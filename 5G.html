<!DOCTYPE html>
<html>
<head>
    <title>Color Blocks</title>
    </head>
    <style type="text/css">
        body {
    margin: 0px;
    }
    div {
    width: 250px;
    height: 100px;
    color: black;
        font-weight: bold; 
     margin: 25px;

    
    }
    div#d1 {
    float: left;
    background-color: red;
    border: 5px solid black;
            }
    div#d2 {
         float: left;
    background-color: green;
    border: 9px solid yellow;
        }
    div#d3 {
    float: left;
            background-color: blue;
            border: 6px solid purple;
            }
    div#d4 {
         float: left;
    background-color: purple;
    border: 5px inset silver;
            }
    </style>
    
    <body>
    <div id="d1">DIV #1</div>
    <div id="d2">DIV #2</div>
    <div id="d3">DIV #3</div>
    <div id="d4">DIV #4</div>
    </body>
    
</html>
